---
name: CI

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version'
        required: true
        default: '20'
        type: choice
        options:
          - '18'
          - '20'
          - '22'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        vscodeVersion:
          # - insiders
          - stable
          - 1.86.0
          - web
        exclude:
          - os: macos-latest
            vscodeVersion: 1.86.0
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install clipboard tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xclip
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version || 20 }}
      - name: Install Dependencies
        run: npm ci
        env:
          DETECT_CHROMEDRIVER_VERSION: true
      - name: Build
        run: npm run build
      - name: Run Tests
        uses: GabrielBB/xvfb-action@b706e4e27b14669b486812790492dc50ca16b465 # v1.7
        with:
          run: npm test
        env:
          VSCODE_VERSION: ${{ matrix.vscodeVersion }}
          VSCODE_WEB_TESTS: ${{ matrix.vscodeVersion == 'web' && '1' || '0' }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: screenshots-${{ matrix.os }}-${{ matrix.vscodeVersion }}
          path: test/screenshots
